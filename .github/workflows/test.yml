name: Test

on:
  push:
    paths:
      - "**"
      - "!**.md"
      - "!dev/**"
      - "!verify/**"
      - "!action.yml"

jobs:

  go-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version-file: go.mod
          cache: false
      - run: make test/go
